<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel & Shekanna — Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overflow-x: hidden;  /* ← solo ocultar horizontal */
  background: #0f1f3d;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
  cursor: pointer;
  user-select: none;
}

canvas#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.splash {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  animation: fadeIn 1.8s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,169,110,0.4); }
  50%     { box-shadow: 0 0 0 16px rgba(201,169,110,0); }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-8px); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.border-box {
  position: fixed;
  inset: 16px;
  border: 1px solid rgba(201,169,110,0.3);
  pointer-events: none;
  z-index: 1;
  animation: fadeIn 3s ease both;
}
.border-box-inner {
  position: fixed;
  inset: 22px;
  border: 1px solid rgba(201,169,110,0.15);
  pointer-events: none;
  z-index: 1;
}

.eyebrow {
  font-size: clamp(9px, 2.5vw, 11px);
  letter-spacing: 5px;
  color: rgba(201,169,110,0.7);
  text-transform: uppercase;
  animation: fadeIn 2s ease both 0.3s;
  opacity: 0;
  animation-fill-mode: forwards;
}

.initials {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(80px, 20vw, 140px);
  line-height: 1.4;
  padding: 16px 24px;      /* ← padding en todos los lados */
  text-shadow: 0 0 60px rgba(201,169,110,0.35);
  background: linear-gradient(90deg,#c9a96e 0%,#e8d5a8 30%,#c9a96e 60%,#fff8e8 80%,#c9a96e 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: float 5s ease-in-out infinite, shimmer 4s linear infinite;
}

.divider {
  display: flex; align-items: center; gap: 10px;
  width: clamp(160px, 40vw, 260px);
  animation: fadeIn 2s ease both 0.5s;
  opacity: 0; animation-fill-mode: forwards;
}
.divider .line {
  flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, #c9a96e, transparent);
}
.divider .diamond {
  width: 5px; height: 5px;
  background: #c9a96e;
  transform: rotate(45deg);
  flex-shrink: 0;
}

.names {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 7vw, 52px);
  font-weight: 600;
  color: #faf7f4;
  letter-spacing: 2px;
  line-height: 1.1;
  animation: fadeIn 1.5s ease both 0.6s;
  opacity: 0; animation-fill-mode: forwards;
}
.names span { color: #d4785a; }

.date {
  font-size: clamp(10px, 2.5vw, 12px);
  letter-spacing: 5px;
  color: rgba(232,213,168,0.7);
  animation: fadeIn 1.5s ease both 0.9s;
  opacity: 0; animation-fill-mode: forwards;
}

.btn {
  margin-top: 16px;
  padding: clamp(14px,3vw,18px) clamp(32px,7vw,56px);
  background: transparent;
  border: 1.5px solid #c9a96e;
  color: #c9a96e;
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(10px, 2.5vw, 12px);
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  animation: fadeIn 1.5s ease both 1.4s, pulse 2.5s ease-in-out infinite 2s;
  opacity: 0; animation-fill-mode: forwards;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #c9a96e;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
  z-index: -1;
}
.btn:hover::before { transform: scaleX(1); }
.btn:hover { color: #0f1f3d; }

.hint {
  font-size: clamp(9px, 2vw, 11px);
  letter-spacing: 2px;
  color: rgba(201,169,110,0.4);
  margin-top: 8px;
  animation: fadeIn 2s ease both 2s;
  opacity: 0; animation-fill-mode: forwards;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="border-box"></div>
<div class="border-box-inner"></div>

<div class="splash">
  <p class="eyebrow">— Te invitamos a nuestra boda —</p> <br>
  <p class="initials">D &amp; S</p>
  <div class="divider">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="diamond" style="opacity:0.5;transform:rotate(45deg) scale(0.6);"></div>
    <div class="diamond"></div>
    <div class="line" style="background:linear-gradient(to left,transparent,#c9a96e,transparent);"></div>
  </div>
  <p class="names">Daniel <span>&</span> Shekanna</p>
  <p class="date">02 · 08 · 2026 &nbsp;·&nbsp; Juliaca, Puno</p>
  <button class="btn" id="enter-btn">✦ Abrir invitación ✦</button>
</div>

<script>
/* ── STARS ── */
(function(){
  var c = document.getElementById('bg');
  var ctx = c.getContext('2d');
  var W, H, stars = [], shooting = [];

  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for(var i=0;i<180;i++) stars.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.6+0.3,
    a: Math.random()*0.8+0.2,
    tw: Math.random()*Math.PI*2,
    ts: Math.random()*0.025+0.008,
    col: Math.random()>0.65?'#e8d5a8':(Math.random()>0.5?'#c9a96e':'#ffffff')
  });

  var frame=0;
  function shoot(){
    if(shooting.length<2) shooting.push({
      x:Math.random()*W*0.7, y:Math.random()*H*0.35,
      vx:Math.random()*6+4, vy:Math.random()*3+1,
      len:Math.random()*90+60, a:1, life:0,
      max:Math.random()*35+25
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    frame++;
    if(frame%200===0) shoot();

    stars.forEach(function(s){
      s.tw+=s.ts;
      var a = s.a*(0.55+0.45*Math.sin(s.tw));
      s.y-=0.018;
      if(s.y<0){ s.y=H; s.x=Math.random()*W; }
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.col;
      ctx.globalAlpha=a;
      ctx.fill();
      if(s.r>1.2){
        var g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3);
        g.addColorStop(0,s.col); g.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);
        ctx.fillStyle=g; ctx.globalAlpha=a*0.25; ctx.fill();
      }
    });

    for(var i=shooting.length-1;i>=0;i--){
      var ss=shooting[i];
      ss.life++; ss.x+=ss.vx; ss.y+=ss.vy;
      ss.a=Math.max(0,1-ss.life/ss.max);
      ctx.beginPath();
      ctx.moveTo(ss.x,ss.y);
      ctx.lineTo(ss.x-ss.vx*(ss.len/9),ss.y-ss.vy*(ss.len/9));
      var g=ctx.createLinearGradient(ss.x,ss.y,ss.x-ss.vx*(ss.len/9),ss.y-ss.vy*(ss.len/9));
      g.addColorStop(0,'rgba(255,255,220,'+ss.a+')');
      g.addColorStop(1,'rgba(201,169,110,0)');
      ctx.strokeStyle=g; ctx.lineWidth=1.5;
      ctx.globalAlpha=ss.a; ctx.stroke();
      if(ss.life>=ss.max) shooting.splice(i,1);
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── ENTRAR ── */
document.getElementById('enter-btn').addEventListener('click', function(){
  // Cargar la invitación en el mismo tab
  window.location.href = 'invitacion.html?autoplay=1';
});
</script>
</body>
</html>
